<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background: matching splash gradient #0B0D14 → #0F1828 → #1A2E50 -->
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#0B0D14"/>
      <stop offset="45%"  stop-color="#0F1828"/>
      <stop offset="100%" stop-color="#1A2E50"/>
    </linearGradient>

    <!-- Blue box: matching splash _IconBox #4D8FE8 → #2D6FD4 -->
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#4D8FE8"/>
      <stop offset="100%" stop-color="#2D6FD4"/>
    </linearGradient>

    <!-- Title text gradient: matching splash ShaderMask #7BB8F0 → #F0F4FF -->
    <linearGradient id="textGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#7BB8F0"/>
      <stop offset="100%" stop-color="#F0F4FF"/>
    </linearGradient>

    <!-- Glow filter for the blue box (matching splash boxShadow) -->
    <filter id="boxGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="28" result="blur"/>
      <feFlood flood-color="#4D8FE8" flood-opacity="0.55" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Subtle glow filter for background circles -->
    <filter id="circleGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="60"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" fill="url(#bg)"/>

  <!-- Decorative glow circles — matching splash Positioned elements -->
  <!-- Top-right: color=#4D8FE8 size=260 opacity=0.12 -->
  <circle cx="870" cy="154" r="280" fill="#4D8FE8" opacity="0.12" filter="url(#circleGlow)"/>
  <!-- Bottom-left: color=#2D6FD4 size=220 opacity=0.08 -->
  <circle cx="154" cy="870" r="240" fill="#2D6FD4" opacity="0.08" filter="url(#circleGlow)"/>

  <!-- Central blue box — proportional to splash _IconBox (88px / 26px radius → scale ×6) -->
  <!-- 88×6=528, 26×6=156 → box 528×528 centered (x=248, y=208) -->
  <rect x="248" y="208" width="528" height="528" rx="156" fill="url(#blue)" filter="url(#boxGlow)"/>

  <!-- "72" — core identity of the app, white bold centered in the box -->
  <text
    x="512" y="500"
    text-anchor="middle"
    dominant-baseline="central"
    font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif"
    font-size="296"
    font-weight="900"
    fill="white"
    opacity="0.95"
  >72</text>

  <!-- "시간" small label below "72", matching splash subtitle color -->
  <text
    x="512" y="660"
    text-anchor="middle"
    dominant-baseline="central"
    font-family="'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif"
    font-size="72"
    font-weight="700"
    fill="#7BB8F0"
    opacity="0.85"
    letter-spacing="14"
  >시간</text>
</svg>
