<svg width="1024" height="1024" viewBox="0 0 440 440" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="c1bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1040"/>
      <stop offset="100%" stop-color="#2d1b6e"/>
    </linearGradient>
    <linearGradient id="c1bar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c4b5fd"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <filter id="c1shadow">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#7c3aed" flood-opacity="0.5"/>
    </filter>
  </defs>
  <rect width="440" height="440" rx="88" fill="url(#c1bg)"/>
  <!-- Left pause bar -->
  <rect x="88" y="94" width="102" height="252" rx="24" fill="url(#c1bar)" filter="url(#c1shadow)"/>
  <!-- Right pause bar -->
  <rect x="250" y="94" width="102" height="252" rx="24" fill="url(#c1bar)" filter="url(#c1shadow)"/>
  <!-- "7" -->
  <text x="139" y="222"
        text-anchor="middle" dominant-baseline="central"
        font-family="'Arial Black','Helvetica Neue',Arial,sans-serif"
        font-size="106" font-weight="900" fill="white">7</text>
  <!-- "2" -->
  <text x="301" y="222"
        text-anchor="middle" dominant-baseline="central"
        font-family="'Arial Black','Helvetica Neue',Arial,sans-serif"
        font-size="106" font-weight="900" fill="white">2</text>
</svg>
